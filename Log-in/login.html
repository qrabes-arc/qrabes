
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login • QRABES</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="bg"></div>

<div class="overlay"></div>

<div class="container">

<div class="login-card">

<div class="logo-box">

<h1>QRABES</h1>

<p>
Luxury Magazine • Social Platform
</p>

</div>

<form id="loginForm">

<div class="input-group">

<label>Email Address</label>

<div class="input-box">

<svg xmlns="http://www.w3.org/2000/svg"
width="20"
height="20"
fill="none"
stroke="currentColor"
stroke-width="2"
viewBox="0 0 24 24">

<path d="M4 4h16v16H4z"/>

<path d="m4 7 8 6 8-6"/>

</svg>

<input
type="email"
placeholder="Enter your email"
required>

</div>

</div>

<div class="input-group">

<label>Password</label>

<div class="input-box">

<svg xmlns="http://www.w3.org/2000/svg"
width="20"
height="20"
fill="none"
stroke="currentColor"
stroke-width="2"
viewBox="0 0 24 24">

<rect
x="3"
y="11"
width="18"
height="10"
rx="2"/>

<path d="M7 11V7a5 5 0 0 1 10 0v4"/>

</svg>

<input
id="password"
type="password"
placeholder="Enter your password"
required>

<button
type="button"
id="togglePassword"
class="eye-btn">

<svg xmlns="http://www.w3.org/2000/svg"
width="20"
height="20"
fill="none"
stroke="currentColor"
stroke-width="2"
viewBox="0 0 24 24">

<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12"/>

<circle
cx="12"
cy="12"
r="3"/>

</svg>

</button>

</div>

</div>

<div class="options">

<label>

<input type="checkbox">

Remember me

</label>

<a href="#">

Forgot Password?

</a>

</div>

<button
type="submit"
class="login-btn">

Login

</button>

<div class="divider">

<span>OR</span>

</div>
<!-- Social Login -->

<div class="social-login">

<button class="google-btn">

<svg xmlns="http://www.w3.org/2000/svg"
width="22"
height="22"
viewBox="0 0 48 48">

<path fill="#FFC107"
d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12S17.4 12 24 12c3 0 5.8 1.1 8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.3-.4-3.5z"/>

<path fill="#FF3D00"
d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3 0 5.8 1.1 8 3l5.7-5.7C34.1 6.1 29.3 4 24 4c-7.7 0-14.3 4.3-17.7 10.7z"/>

<path fill="#4CAF50"
d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.3c-2.1 1.6-4.7 2.5-7.3 2.5-5.3 0-9.8-3.3-11.4-8l-6.5 5C9.4 39.5 16.1 44 24 44z"/>

<path fill="#1976D2"
d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.2-3.4 5.7-6.3 7.5l6.3 5.3C39.8 37.1 44 31.1 44 24c0-1.2-.1-2.3-.4-3.5z"/>

</svg>

Continue with Google

</button>



<button class="apple-btn">

<svg xmlns="http://www.w3.org/2000/svg"
width="22"
height="22"
fill="currentColor"
viewBox="0 0 24 24">

<path d="M16.37 1.43c0 1.14-.43 2.24-1.13 3.02-.73.81-1.92 1.43-3.02 1.34-.14-1.11.37-2.28 1.07-3.02.74-.8 2.01-1.38 3.08-1.34zM20.5 17.1c-.61 1.4-.9 2.02-1.69 3.24-1.11 1.71-2.67 3.84-4.61 3.86-1.73.02-2.18-1.13-4.53-1.12-2.35.01-2.85 1.14-4.58 1.12-1.94-.02-3.42-1.95-4.53-3.65C-1.2 16.6-.65 9.74 3.08 7.73c2.28-1.23 4.71-.98 6.18.13 1.4 1.04 2.24 1.15 3.73.13 1.66-1.15 4.02-1.03 6.06.25-5.35 2.92-4.49 10.54 1.45 8.86z"/>

</svg>

Continue with Apple

</button>

</div>



<div class="signup">

<p>

Don't have an account?

<a href="signup.html">

Create Account

</a>

</p>

</div>

</form>

</div>

</div>

<script src="login.js"></script>

</body>

</html>
