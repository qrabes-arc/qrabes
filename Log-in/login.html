
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login • QRABES</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="bg"></div>

<div class="overlay"></div>

<div class="container">

<div class="login-card">

<div class="logo-box">

<h1>QRABES</h1>

<p>
Luxury Magazine • Social Platform
</p>

</div>

<form id="loginForm">

<div class="input-group">

<label>Email Address</label>

<div class="input-box">

<svg xmlns="http://www.w3.org/2000/svg"
width="20"
height="20"
fill="none"
stroke="currentColor"
stroke-width="2"
viewBox="0 0 24 24">

<path d="M4 4h16v16H4z"/>

<path d="m4 7 8 6 8-6"/>

</svg>

<input
type="email"
placeholder="Enter your email"
required>

</div>

</div>

<div class="input-group">

<label>Password</label>

<div class="input-box">

<svg xmlns="http://www.w3.org/2000/svg"
width="20"
height="20"
fill="none"
stroke="currentColor"
stroke-width="2"
viewBox="0 0 24 24">

<rect
x="3"
y="11"
width="18"
height="10"
rx="2"/>

<path d="M7 11V7a5 5 0 0 1 10 0v4"/>

</svg>

<input
id="password"
type="password"
placeholder="Enter your password"
required>

<button
type="button"
id="togglePassword"
class="eye-btn">

<svg xmlns="http://www.w3.org/2000/svg"
width="20"
height="20"
fill="none"
stroke="currentColor"
stroke-width="2"
viewBox="0 0 24 24">

<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12"/>

<circle
cx="12"
cy="12"
r="3"/>

</svg>

</button>

</div>

</div>

<div class="options">

<label>

<input type="checkbox">

Remember me

</label>

<a href="#">

Forgot Password?

</a>

</div>

<button
type="submit"
class="login-btn">

Login

</button>

<div class="divider">

<span>OR</span>

</div>




<div class="signup">

<p>

Don't have an account?

<a href="signup.html">

Create Account

</a>

</p>

</div>

</form>

</div>

</div>

<script src="login.js"></script>

</body>

</html>
