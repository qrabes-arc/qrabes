<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QRABES | Luxury Magazine</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.tailwindcss.com"></script>


<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


</head>


<body class="bg-[#0a0a0a] text-white font-[Inter] overflow-x-hidden">


<!-- HEADER -->

<header class="sticky top-0 z-50 bg-black/70 backdrop-blur-xl border-b border-white/10">


<div class="h-[72px] flex items-center justify-between px-5 md:px-10">


<div class="logo">

<a href="#" 
class="text-3xl font-bold tracking-[10px]">
QRABES
</a>

</div>



<nav class="hidden lg:flex gap-8 text-gray-400">

<a class="hover:text-white">
Home
</a>

<a class="hover:text-white">
Explore
</a>

<a class="hover:text-white">
Magazine
</a>

<a class="hover:text-white">
Brands
</a>

<a class="hover:text-white">
Collections
</a>

</nav>



<div class="hidden md:block w-[360px]">

<input

id="search"

class="w-full h-11 rounded-full bg-[#181818] border border-white/10 px-5 outline-none focus:border-yellow-500"

placeholder="Search luxury stories..."

>

</div>



<div class="flex gap-2">


<button class="w-11 h-11 rounded-full bg-[#181818]">
🔔
</button>


<button class="w-11 h-11 rounded-full bg-[#181818]">
👤
</button>


<button class="w-11 h-11 rounded-full bg-[#181818]">
☰
</button>


</div>


</div>




<div class="flex gap-6 overflow-x-auto px-5 md:px-10 py-3 border-t border-white/5 whitespace-nowrap">


<a class="text-gray-400">
Trending
</a>


<a class="text-gray-400">
Fashion
</a>


<a class="text-gray-400">
Lifestyle
</a>


<a class="text-gray-400">
Luxury
</a>


<a class="text-gray-400">
Travel
</a>


<a class="text-gray-400">
Design
</a>


</div>


</header>





<!-- HERO -->


<section class="h-[75vh] md:h-[92vh] flex items-center justify-center text-center px-5 bg-cover bg-center"
style="background-image:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.8)),url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1800')">


<div>


<h1 class="text-5xl md:text-7xl font-bold mb-6">
Discover Luxury Stories
</h1>


<p class="max-w-2xl text-gray-300 text-lg leading-8">

Fashion, lifestyle, brands and inspiring stories from around the world.

</p>


</div>


</section>





<!-- FEED -->


<main>


<div id="loading" 
class="text-center py-10 text-gray-400">

Loading Luxury Stories...

</div>



<div id="feed"
class="w-full md:w-[95%] max-w-[1200px] mx-auto">

</div>


</main>





<!-- FOOTER -->


<footer class="text-center py-10 border-t border-white/10 mt-10">


<h2 class="text-3xl font-bold">
QRABES
</h2>


<p class="text-gray-400 mt-2">
Luxury Digital Magazine
</p>


</footer>





<script src="app.js"></script>


</body>

</html>
