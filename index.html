<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QRABES | Luxury Magazine</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.tailwindcss.com"></script>


<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


</head>


<body class="bg-[#0a0a0a] text-white font-[Inter] overflow-x-hidden">


<!-- HEADER -->

<header class="sticky top-0 z-50 bg-black/80 backdrop-blur-xl border-b border-white/10">

    <div class="h-[72px] flex items-center justify-between px-4 md:px-10">

        <!-- Left -->

        <div class="flex items-center gap-3">

            <!-- Menu -->

            <button id="menu-btn"
                class="w-11 h-11 flex items-center justify-center rounded-full bg-[#181818] hover:bg-[#242424] transition">

                <!-- Menu SVG -->

                <svg xmlns="http://www.w3.org/2000/svg"
                    width="22"
                    height="22"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24">

                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>

                </svg>

            </button>

        </div>

        <!-- Logo -->
<a href="/" class="flex items-center">
    <img 
      src="/assets/1000102915-removebg-preview.png"
      alt="Qrabes Logo"
      class="h-12 w-auto"
    >
</a>
        

        <!-- Right -->

        <div class="flex items-center gap-2">

            <!-- Search -->

            <button
                class="w-11 h-11 flex items-center justify-center rounded-full bg-[#181818] hover:bg-[#242424] transition">

                <svg xmlns="http://www.w3.org/2000/svg"
                    width="21"
                    height="21"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24">

                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.3-4.3"/>

                </svg>

            </button>

            <!-- Login (Not Logged In) -->

            <a id="loginBtn"
                href="/Log-in/login.html"
                class="px-5 h-8 hidden md:flex items-center rounded-full bg-yellow-500 text-black font-semibold hover:bg-yellow-400 transition">

                Login

            </a>

            <!-- Logged In Icons -->

            <div id="profileArea" class="hidden items-center gap-2">

                <!-- Notification -->

                <button
                    class="w-11 h-11 flex items-center justify-center rounded-full bg-[#181818] hover:bg-[#242424] transition">

                    <svg xmlns="http://www.w3.org/2000/svg"
                        width="21"
                        height="21"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        viewBox="0 0 24 24">

                        <path d="M15 17h5l-1.5-1.5A2 2 0 0 1 18 14V11a6 6 0 0 0-12 0v3a2 2 0 0 1-.5 1.5L4 17h5"/>
                        <path d="M9 17a3 3 0 0 0 6 0"/>

                    </svg>

                </button>

                <!-- Profile -->

                <button
                    class="w-11 h-11 flex items-center justify-center rounded-full bg-[#181818] hover:bg-[#242424] transition">

                    <svg xmlns="http://www.w3.org/2000/svg"
                        width="21"
                        height="21"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        viewBox="0 0 24 24">

                        <circle cx="12" cy="8" r="4"/>
                        <path d="M20 21a8 8 0 0 0-16 0"/>

                    </svg>

                </button>

            </div>

        </div>

    </div>

    <!-- Desktop Navigation -->

    <nav class="hidden lg:flex justify-center gap-8 py-4 border-t border-white/5">

        <a class="hover:text-yellow-400 transition">Home</a>

        <a class="hover:text-yellow-400 transition">Explore</a>

        <a class="hover:text-yellow-400 transition">Magazine</a>

        <a class="hover:text-yellow-400 transition">Brands</a>

        <a class="hover:text-yellow-400 transition">Collections</a>

    </nav>

    <!-- Categories -->

    <div class="flex gap-7 overflow-x-auto px-5 md:px-10 py-3 border-t border-white/5 whitespace-nowrap">

        <a class="text-gray-400 hover:text-yellow-400">Trending</a>

        <a class="text-gray-400 hover:text-yellow-400">Fashion</a>

        <a class="text-gray-400 hover:text-yellow-400">Lifestyle</a>

        <a class="text-gray-400 hover:text-yellow-400">Luxury</a>

        <a class="text-gray-400 hover:text-yellow-400">Travel</a>

        <a class="text-gray-400 hover:text-yellow-400">Design</a>

    </div>
<!-- Mobile Menu -->

<div id="mobile-menu"
class="hidden fixed top-[72px] left-0 w-full bg-black border-b border-white/10 p-6">

    <a class="block py-3 text-white">Home</a>
    <a class="block py-3 text-white">Explore</a>
    <a class="block py-3 text-white">Magazine</a>
    <a class="block py-3 text-white">Brands</a>
    <a class="block py-3 text-white">Collections</a>

</div>
</header>

<script>

const isLoggedIn = false;

const loginBtn = document.getElementById("loginBtn");

const profileArea = document.getElementById("profileArea");

if(isLoggedIn){

    loginBtn.style.display="none";

    profileArea.style.display="flex";

}else{

    loginBtn.style.display="flex";

    profileArea.style.display="none";

}
const menuBtn = document.getElementById("menu-btn");
const mobileMenu = document.getElementById("mobile-menu");


menuBtn.addEventListener("click",()=>{

    mobileMenu.classList.toggle("hidden");

});
    
</script>











<!-- FEED -->


<main>


<div id="loading" 
class="text-center py-10 text-gray-400">

Loading Luxury Stories...

</div>



<div id="feed"
class="w-full md:w-[95%] max-w-[1200px] mx-auto">

</div>


</main>





<!-- FOOTER -->


<footer class="text-center py-10 border-t border-white/10 mt-10">


<h2 class="text-3xl font-bold">
QRABES
</h2>


<p class="text-gray-400 mt-2">
Luxury Digital Magazine
</p>


</footer>





<script src="app.js"></script>
<script>

const menuBtn = document.getElementById("menu-btn");

const mobileMenu = document.getElementById("mobile-menu");


if(menuBtn && mobileMenu){

    menuBtn.addEventListener("click",()=>{

        mobileMenu.classList.toggle("active");

    });

}

</script>

</body>

</html>
